<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangzhou — Price Forecast</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Hero ─────────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      height: 56vh;
      min-height: 340px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }
    .hero-img {
      position: absolute; inset: 0;
      /* ↓ Replace with your West Lake photo URL */
      background: url('assets/bg/westlake.jpg') center/cover no-repeat;
      background-color: #b8d4ea; /* fallback sky color if image missing */
    }
    /* Gradient overlay — transparent top, frosted bottom */
    .hero-img::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(240,246,252,0) 0%,
        rgba(240,246,252,0.15) 50%,
        rgba(240,246,252,0.82) 100%
      );
    }

    /* Price Forecast Result card — top right */
    .price-result {
      position: absolute;
      top: 32px; right: 48px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border: 1.5px solid rgba(255,255,255,0.9);
      border-radius: 20px;
      padding: 24px 36px;
      text-align: center;
      box-shadow: 0 12px 48px rgba(13,45,82,0.16);
      min-width: 260px;
      z-index: 10;
      transition: transform var(--spring), box-shadow var(--spring);
    }
    .price-result:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(13,45,82,0.22); }
    .price-label {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 11px; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.12em; margin-bottom: 8px;
    }
    .price-value {
      font-family: 'Libre Baskerville', serif;
      font-size: 42px; font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .price-value .currency {
      font-size: 26px; font-weight: 400;
      vertical-align: top; margin-top: 6px;
      display: inline-block;
    }
    .price-change {
      margin-top: 8px;
      font-size: 12px; font-weight: 600;
      color: #2a9d5c;
    }

    /* ── District bar ──────────────────────────────────── */
    .content-section {
      position: relative; z-index: 5;
      padding: 0 48px 48px;
      background: var(--bg);
    }

    .district-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 20px 0 24px;
      flex-wrap: wrap;
    }
    .district-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px;
      border-radius: 50px;
      border: 1.5px solid rgba(13,45,82,0.15);
      background: rgba(255,255,255,0.55);
      color: var(--muted);
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; user-select: none;
      backdrop-filter: blur(8px);
      transition: all var(--ease), transform var(--spring);
    }
    .district-pill .cn { font-size: 12px; opacity: 0.7; }
    .district-pill.active {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 18px rgba(13,45,82,0.25);
    }
    .district-pill:hover:not(.active) {
      background: rgba(13,45,82,0.07); color: var(--accent); transform: scale(1.05);
    }

    /* ── 3 filter cards grid ───────────────────────────── */
    .filters-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      margin-bottom: 32px;
    }

    .filter-card {
      padding: 26px 24px;
      display: flex; flex-direction: column; gap: 20px;
      position: relative; overflow: hidden;
    }
    .filter-card h2 {
      font-size: 17px;
      display: flex; align-items: center; gap: 9px;
    }
    .filter-card h2 svg { color: var(--accent2); flex-shrink: 0; }

    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── CTA ───────────────────────────────────────────── */
    .cta-center {
      display: flex; justify-content: center; margin-top: 4px;
    }
    .cta-center .btn-primary {
      padding: 16px 52px; font-size: 16px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="forecast.html" class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 2l2 4H14l2-4z" fill="currentColor"/>
      <rect x="13" y="6" width="6" height="3" rx="1" fill="currentColor" opacity=".8"/>
      <path d="M11 9l2 4H9l2-4z" fill="currentColor" opacity=".9"/>
      <path d="M21 9l2 4h-4l2-4z" fill="currentColor" opacity=".9"/>
      <rect x="8" y="13" width="16" height="3" rx="1" fill="currentColor" opacity=".75"/>
      <path d="M6 16l2 5H4l2-5z" fill="currentColor" opacity=".8"/>
      <path d="M26 16l2 5h-4l2-5z" fill="currentColor" opacity=".8"/>
      <rect x="3" y="21" width="26" height="3" rx="1" fill="currentColor" opacity=".7"/>
      <rect x="13" y="24" width="6" height="6" rx="1" fill="currentColor" opacity=".6"/>
    </svg>
    <span>Hangzhou</span>
  </a>
  <div class="nav-center">
    <a href="forecast.html" data-page="forecast.html">Price Forecast</a>
    <a href="index.html"    data-page="index.html">Dashboard</a>
    <a href="contact.html"  data-page="contact.html">Contact Us</a>
  </div>
  <div class="nav-right">
    <a href="index.html" class="nav-icon-btn" title="Profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </a>
    <button class="nav-icon-btn" id="menuBtn" title="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
</nav>

<!-- Drawer -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose">✕</button>
  <a href="forecast.html" data-page="forecast.html">🏠 Price Forecast</a>
  <a href="index.html"    data-page="index.html">👤 Dashboard</a>
  <a href="contact.html"  data-page="contact.html">✉️ Contact Us</a>
</div>

<!-- PAGE -->
<div class="page">

  <!-- Hero -->
  <section class="hero">
    <div class="hero-img"></div>

    <!-- Price Result -->
    <div class="price-result">
      <div class="price-label">Price Forecast Result</div>
      <div class="price-value">
        <span class="currency">¥</span><span id="priceDisplay">3,850,000</span>
      </div>
      <div class="price-change">↑ Est. +4.2% YoY</div>
    </div>
  </section>

  <!-- Content -->
  <section class="content-section">

    <!-- District Bar -->
    <div class="district-bar">
      <div class="district-pill active" onclick="selectDistrict(this)">Xihu <span class="cn">西湖</span></div>
      <div class="district-pill" onclick="selectDistrict(this)">Gongshu <span class="cn">拱墅</span></div>
      <div class="district-pill" onclick="selectDistrict(this)">Shangcheng <span class="cn">上城</span></div>
      <div class="district-pill" onclick="selectDistrict(this)">Binjiang <span class="cn">滨江</span></div>
      <div class="district-pill" onclick="selectDistrict(this)">Xiaoshan <span class="cn">萧山</span></div>
      <div class="district-pill" onclick="selectDistrict(this)">Yuhang <span class="cn">余杭</span></div>
    </div>

    <!-- Filter cards -->
    <div class="filters-grid">

      <!-- Card 1: Area & Location -->
      <div class="card filter-card">
        <h2>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18" opacity=".5"/></svg>
          Area &amp; Location
        </h2>

        <div class="filter-group">
          <label class="field-label">Subway Line</label>
          <div class="pill-group">
            <button class="pill-btn active" onclick="togglePill(this)">Line 1</button>
            <button class="pill-btn" onclick="togglePill(this)">Line 2</button>
            <button class="pill-btn" onclick="togglePill(this)">Line 3</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="field-label">Subway Distance</label>
          <input type="range" min="0" max="3000" value="800" oninput="updatePrice()" />
        </div>

        <div class="filter-group">
          <label class="field-label">School Distance</label>
          <select onchange="updatePrice()">
            <option>Distance-band</option>
            <option>Within 500m</option>
            <option>500m – 1km</option>
            <option>1km – 2km</option>
            <option>Over 2km</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="field-label">Neighborhood Amenities</label>
          <select onchange="updatePrice()">
            <option>Proximity to parks, hospitals, shopping</option>
            <option>Parks nearby</option>
            <option>Hospital nearby</option>
            <option>Shopping nearby</option>
          </select>
        </div>

        <svg class="deco-stamp" viewBox="0 0 80 80" fill="none">
          <rect x="36" y="0" width="7" height="80" rx="3" fill="#0d2d52"/>
          <rect x="36" y="20" width="7" height="3" rx="1" fill="#fff"/>
          <rect x="36" y="45" width="7" height="3" rx="1" fill="#fff"/>
          <path d="M43 25 Q62 14 60 5" stroke="#0d2d52" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M36 50 Q16 39 18 30" stroke="#0d2d52" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Card 2: House Details -->
      <div class="card filter-card">
        <h2>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          House Details
        </h2>

        <div class="filter-group">
          <label class="field-label">Floor</label>
          <div class="pill-group">
            <button class="pill-btn" onclick="togglePill(this)">Low</button>
            <button class="pill-btn active" onclick="togglePill(this)">Medium</button>
            <button class="pill-btn" onclick="togglePill(this)">High</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="field-label">Age</label>
          <div class="pill-group">
            <button class="pill-btn active" onclick="togglePill(this)">New</button>
            <button class="pill-btn" onclick="togglePill(this)">&lt;10 years</button>
            <button class="pill-btn" onclick="togglePill(this)">10–20 years</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="field-label">Decoration</label>
          <div class="pill-group">
            <button class="pill-btn active" onclick="togglePill(this)">Standard</button>
            <button class="pill-btn" onclick="togglePill(this)">Luxury</button>
            <button class="pill-btn" onclick="togglePill(this)">Simple</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="field-label">Has Elevator</label>
          <label class="toggle-switch">
            <input type="checkbox" onchange="updatePrice()" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Card 3: Property Specifics -->
      <div class="card filter-card">
        <h2>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
          Property Specifics
        </h2>

        <div class="filter-group">
          <label class="field-label">Property Type</label>
          <div class="pill-group">
            <button class="pill-btn active" onclick="togglePill(this)">Apartment</button>
            <button class="pill-btn" onclick="togglePill(this)">House</button>
            <button class="pill-btn" onclick="togglePill(this)">Villa</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="field-label">Room Type</label>
          <div class="pill-group">
            <button class="pill-btn" onclick="togglePill(this)">1-Bed</button>
            <button class="pill-btn active" onclick="togglePill(this)">2-Bed</button>
            <button class="pill-btn" onclick="togglePill(this)">3-Bed</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="field-label">Bathrooms</label>
          <div class="pill-group">
            <button class="pill-btn" onclick="togglePill(this)">1</button>
            <button class="pill-btn active" onclick="togglePill(this)">2</button>
            <button class="pill-btn" onclick="togglePill(this)">3</button>
            <button class="pill-btn" onclick="togglePill(this)">etc</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="field-label">Parking Rate</label>
          <select onchange="updatePrice()">
            <option>Per Month &lt; Fee range</option>
            <option>Free</option>
            <option>¥200–400 / month</option>
            <option>¥400–600 / month</option>
            <option>Over ¥600 / month</option>
          </select>
        </div>

        <svg class="deco-stamp" viewBox="0 0 80 80" fill="none">
          <path d="M40 5l5 10H35L40 5z" fill="#0d2d52"/>
          <rect x="33" y="15" width="14" height="6" rx="2" fill="#0d2d52"/>
          <path d="M28 21l4 8H24l4-8z" fill="#0d2d52"/>
          <path d="M52 21l4 8h-8l4-8z" fill="#0d2d52"/>
          <rect x="20" y="29" width="40" height="6" rx="2" fill="#0d2d52"/>
          <rect x="8" y="45" width="64" height="6" rx="2" fill="#0d2d52"/>
          <rect x="33" y="51" width="14" height="20" rx="2" fill="#0d2d52"/>
        </svg>
      </div>

    </div><!-- /filters-grid -->

    <!-- CTA -->
    <div class="cta-center">
      <a href="index.html" class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Find Matching Listings
      </a>
    </div>

  </section>
</div>

<script src="nav.js"></script>
<script>
  function togglePill(btn) {
    const group = btn.closest('.pill-group');
    group.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updatePrice();
  }

  function selectDistrict(pill) {
    document.querySelectorAll('.district-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    updatePrice();
  }

  const basePrices = {
    'Xihu': 4200000, 'Gongshu': 3400000, 'Shangcheng': 3850000,
    'Binjiang': 3600000, 'Xiaoshan': 2800000, 'Yuhang': 2600000
  };

  function updatePrice() {
    const activePill = document.querySelector('.district-pill.active');
    const districtKey = activePill ? activePill.textContent.trim().replace(/[\u4e00-\u9fa5]/g,'').trim() : 'Xihu';
    let price = basePrices[districtKey] || 3850000;

    // Room type modifier
    const roomPill = document.querySelector('.filter-card:nth-child(3) .filter-group:nth-child(3) .pill-btn.active');
    if (roomPill) {
      if (roomPill.textContent.includes('1')) price *= 0.72;
      if (roomPill.textContent.includes('3')) price *= 1.32;
    }

    // Floor modifier
    const floorPill = document.querySelector('.filter-card:nth-child(2) .filter-group:nth-child(2) .pill-btn.active');
    if (floorPill) {
      if (floorPill.textContent === 'High') price *= 1.08;
      if (floorPill.textContent === 'Low') price *= 0.96;
    }

    document.getElementById('priceDisplay').textContent =
      Math.round(price / 1000) * 1000 >= 1000000
        ? (Math.round(price / 10000) / 100).toFixed(2).replace(/\.?0+$/, '') + ',000'
        : Math.round(price).toLocaleString();
    
    document.getElementById('priceDisplay').textContent = 
      Math.round(price).toLocaleString('en-US');
  }
</script>
</body>
</html>
